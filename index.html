<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a1a;
      color: #f0ebe3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #111;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #e8d8b0;
    }

    #count {
      font-size: 0.8rem;
      color: #888;
      font-family: monospace;
    }

    #map {
      flex: 1;
    }

    #map .leaflet-tile-pane {
      opacity: 0.65;
    }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #1e1e1e;
      color: #f0ebe3;
      border-radius: 8px;
      border: 1px solid #444;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 0;
    }

    .leaflet-popup-tip {
      background: #1e1e1e;
    }

    .leaflet-popup-content {
      margin: 0;
      width: 280px !important;
    }

    .popup {
      padding: 14px 16px;
    }

    .popup img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      display: block;
      background: #2a2a2a;
    }

    .popup-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #e8d8b0;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .popup-artist {
      font-size: 0.85rem;
      font-style: italic;
      color: #bbb;
      margin-bottom: 8px;
    }

    .popup-meta {
      font-size: 0.78rem;
      color: #999;
      font-family: monospace;
      line-height: 1.7;
    }

    .popup-meta span {
      color: #ccc;
    }

    .popup-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #c9a96e;
      text-decoration: none;
      border-bottom: 1px solid #c9a96e44;
      padding-bottom: 1px;
    }

    .popup-link:hover { color: #e8c87a; border-color: #e8c87a; }

    .paintings-list {
      margin-top: 10px;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #333;
      padding-top: 8px;
    }

    .painting-row {
      font-size: 0.8rem;
      padding: 4px 0;
      border-bottom: 1px solid #2a2a2a;
      line-height: 1.4;
    }

    .painting-row:last-child { border-bottom: none; }

    .painting-link { color: #c9a96e; text-decoration: none; }
    .painting-link:hover { color: #e8c87a; text-decoration: underline; }

    .painting-row em { color: #777; font-style: normal; font-size: 0.75rem; }
    .painting-medium { color: #666; font-size: 0.72rem; }

    .popup-artist em { color: #888; font-size: 0.82rem; }


    /* cluster overrides */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-clip: padding-box;
    }

    .marker-cluster-small       { background-color: rgba(181, 130, 60, 0.5); }
    .marker-cluster-small div   { background-color: rgba(181, 130, 60, 0.9); color: #fff; }
    .marker-cluster-medium      { background-color: rgba(160, 90,  40, 0.5); }
    .marker-cluster-medium div  { background-color: rgba(160, 90,  40, 0.9); color: #fff; }
    .marker-cluster-large       { background-color: rgba(124, 15, 48, 0.5); }
    .marker-cluster-large div   { background-color: rgba(124, 15, 48, 0.9); color: #fff; }

    .emoji-marker {
      font-size: 18px;
      line-height: 1;
      text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7));
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Timeline ── */
    #timeline {
      flex-shrink: 0;
      background: #111;
      border-top: 1px solid #333;
      padding: 10px 24px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #timeline-label {
      font-family: monospace;
      font-size: 0.78rem;
      color: #aaa;
      text-align: center;
    }

    #timeline-label span { color: #e8d8b0; }

    .range-wrap {
      position: relative;
      height: 20px;
    }

    .range-wrap input[type=range] {
      position: absolute;
      width: 100%;
      height: 4px;
      appearance: none;
      background: transparent;
      pointer-events: none;
      outline: none;
    }

    .range-wrap input[type=range]::-webkit-slider-thumb {
      appearance: none;
      pointer-events: all;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #c9a96e;
      border: 2px solid #8a6a3a;
      cursor: grab;
    }

    .range-wrap input[type=range]::-moz-range-thumb {
      pointer-events: all;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #c9a96e;
      border: 2px solid #8a6a3a;
      cursor: grab;
    }

    #range-track {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      width: 100%;
      background: #333;
      border-radius: 2px;
      z-index: 0;
    }

    #range-fill {
      position: absolute;
      height: 100%;
      background: #c9a96e;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>Art Map</h1>
  <span id="count">loading…</span>
</header>

<div id="map"></div>

<div id="timeline">
  <div id="timeline-label">
    <span id="year-from">1300</span> – <span id="year-to">2026</span>
  </div>
  <div class="range-wrap">
    <div id="range-track"><div id="range-fill"></div></div>
    <input type="range" id="slider-from" min="1300" max="2026" value="1300" step="1">
    <input type="range" id="slider-to"   min="1300" max="2026" value="2026" step="1">
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  const map = L.map('map', {
    center: [48, 14],
    zoom: 4,
    preferCanvas: true,
  });

  const realistic = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  });

  const schematic = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  });

  schematic.addTo(map);

  L.control.layers(
    { 'Schematic': schematic, 'Realistic': realistic },
    {},
    { position: 'topright', collapsed: false }
  ).addTo(map);

  const markers = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 60,
  });

  function popupHTML(a) {
    const meta = [
      a.birth_year   ? `lived       <span>${escHtml(a.birth_year)}${a.death_year ? '–' + escHtml(a.death_year) : ''}</span>` : '',
      a.birth_place  ? `born        <span>${escHtml(a.birth_place)}</span>`  : '',
      a.citizenship  ? `citizenship <span>${escHtml(a.citizenship)}</span>`  : '',
      a.movement     ? `movement    <span>${escHtml(a.movement)}</span>`     : '',
    ].filter(Boolean).join('<br>');

    const paintingRows = a.paintings.map(p => {
      const link = p.museum_url
        ? `<a class="painting-link" href="${p.museum_url}" target="_blank" rel="noopener">${escHtml(p.title || 'Untitled')}</a>`
        : `<span>${escHtml(p.title || 'Untitled')}</span>`;
      const date   = p.date   ? ` <em>${escHtml(p.date)}</em>` : '';
      const medium = p.medium ? `<div class="painting-medium">${escHtml(p.medium.slice(0, 60))}</div>` : '';
      return `<div class="painting-row">${link}${date}${medium}</div>`;
    }).join('');

    return `
      <div class="popup">
        <div class="popup-artist">${escHtml(a.artist || 'Unknown artist')}</div>
        <div class="popup-meta">${meta}</div>
        <div class="paintings-list">${paintingRows}</div>
      </div>`;
  }

  const MOVEMENT_EMOJI = {
    'baroque':              '🎭',
    'impressionism':        '🌸',
    'impressionist':        '🌸',
    'renaissance':          '🏛️',
    'high renaissance':     '🏛️',
    'northern renaissance': '🏛️',
    'dutch golden age':     '🌷',
    'romanticism':          '🌙',
    'romantic':             '🌙',
    'realism':              '🏘️',
    'neoclassicism':        '⚖️',
    'neoclassical':         '⚖️',
    'rococo':               '🎀',
    'mannerism':            '🌀',
    'symbolism':            '🔮',
    'post-impressionism':   '⭐',
    'expressionism':        '💥',
    'surrealism':           '🫧',
    'cubism':               '🔲',
    'abstract':             '🔷',
    'gothic':               '⛪',
    'orientalism':          '🌙',
    'naturalism':           '🌿',
    'pre-raphaelite':       '🌹',
  };

  function movementEmojis(movement) {
    if (!movement) return '🎨';
    const emojis = movement.split(';')
      .map(m => {
        const key = m.trim().toLowerCase();
        return MOVEMENT_EMOJI[key]
          ?? Object.entries(MOVEMENT_EMOJI).find(([k]) => key.includes(k))?.[1]
          ?? null;
      })
      .filter(Boolean);
    return emojis.length ? [...new Set(emojis)].join('') : '🎨';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Parse the first 4-digit year from a date string like "ca. 1650", "1700–1750"
  function parseYear(dateStr) {
    const m = String(dateStr).match(/\d{4}/);
    return m ? parseInt(m[0]) : null;
  }

  const sliderFrom = document.getElementById('slider-from');
  const sliderTo   = document.getElementById('slider-to');
  const labelFrom  = document.getElementById('year-from');
  const labelTo    = document.getElementById('year-to');
  const fill       = document.getElementById('range-fill');

  function updateFill() {
    const min  = parseInt(sliderFrom.min);
    const max  = parseInt(sliderFrom.max);
    const from = parseInt(sliderFrom.value);
    const to   = parseInt(sliderTo.value);
    const left  = (from - min) / (max - min) * 100;
    const right = (to   - min) / (max - min) * 100;
    fill.style.left  = left  + '%';
    fill.style.width = (right - left) + '%';
  }

  fetch('data/paintings.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(artists => {
      // Pre-compute min year per artist
      artists.forEach(a => {
        const years = a.paintings.map(p => parseYear(p.date)).filter(y => y !== null);
        a._minYear = years.length ? Math.min(...years) : null;
        a._maxYear = years.length ? Math.max(...years) : null;
      });

      // Find data range for slider bounds
      const allYears = artists.flatMap(a => [a._minYear, a._maxYear]).filter(Boolean);
      const dataMin  = Math.min(...allYears);
      const dataMax  = 2026;
      [sliderFrom, sliderTo].forEach(s => { s.min = dataMin; s.max = dataMax; });
      sliderFrom.value = dataMin;
      sliderTo.value   = dataMax;
      labelFrom.textContent = dataMin;
      labelTo.textContent   = dataMax;
      updateFill();

      // Build markers
      const markerMap = new Map(); // artist index → marker
      artists.forEach((a, i) => {
        const emoji = movementEmojis(a.movement);
        const icon = L.divIcon({
          html: `<div class="emoji-marker">${emoji}</div>`,
          className: '',
          iconSize: null,
          iconAnchor: [10, 10],
        });
        const marker = L.marker([a.lat, a.lng], { icon });
        marker.bindPopup(() => popupHTML(a), { maxWidth: 320 });
        markerMap.set(i, marker);
        markers.addLayer(marker);
      });
      map.addLayer(markers);

      function applyFilter() {
        const from = parseInt(sliderFrom.value);
        const to   = parseInt(sliderTo.value);
        labelFrom.textContent = from;
        labelTo.textContent   = to;
        updateFill();

        markers.clearLayers();
        let visible = 0, paintings = 0;
        artists.forEach((a, i) => {
          const inRange = a._minYear === null
            || (a._minYear <= to && (a._maxYear === null || a._maxYear >= from));
          if (inRange) {
            markers.addLayer(markerMap.get(i));
            visible++;
            paintings += a.paintings.length;
          }
        });
        document.getElementById('count').textContent =
          `${visible} artists · ${paintings} paintings`;
      }

      sliderFrom.addEventListener('input', () => {
        if (parseInt(sliderFrom.value) > parseInt(sliderTo.value))
          sliderFrom.value = sliderTo.value;
        applyFilter();
      });
      sliderTo.addEventListener('input', () => {
        if (parseInt(sliderTo.value) < parseInt(sliderFrom.value))
          sliderTo.value = sliderFrom.value;
        applyFilter();
      });

      const totalPaintings = artists.reduce((n, a) => n + a.paintings.length, 0);
      document.getElementById('count').textContent =
        `${artists.length} artists · ${totalPaintings} paintings`;
    })
    .catch(err => {
      document.getElementById('count').textContent = 'error loading data';
      console.error(err);
    });
</script>
</body>
</html>
