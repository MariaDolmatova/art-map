<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a1a;
      color: #f0ebe3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #111;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #e8d8b0;
    }

    #count {
      font-size: 0.8rem;
      color: #888;
      font-family: monospace;
    }

    #map {
      flex: 1;
    }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #1e1e1e;
      color: #f0ebe3;
      border-radius: 8px;
      border: 1px solid #444;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 0;
    }

    .leaflet-popup-tip {
      background: #1e1e1e;
    }

    .leaflet-popup-content {
      margin: 0;
      width: 280px !important;
    }

    .popup {
      padding: 14px 16px;
    }

    .popup img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      display: block;
      background: #2a2a2a;
    }

    .popup-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #e8d8b0;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .popup-artist {
      font-size: 0.85rem;
      font-style: italic;
      color: #bbb;
      margin-bottom: 8px;
    }

    .popup-meta {
      font-size: 0.78rem;
      color: #999;
      font-family: monospace;
      line-height: 1.7;
    }

    .popup-meta span {
      color: #ccc;
    }

    .popup-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #c9a96e;
      text-decoration: none;
      border-bottom: 1px solid #c9a96e44;
      padding-bottom: 1px;
    }

    .popup-link:hover { color: #e8c87a; border-color: #e8c87a; }

    .paintings-list {
      margin-top: 10px;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #333;
      padding-top: 8px;
    }

    .painting-row {
      font-size: 0.8rem;
      padding: 4px 0;
      border-bottom: 1px solid #2a2a2a;
      line-height: 1.4;
    }

    .painting-row:last-child { border-bottom: none; }

    .painting-link { color: #c9a96e; text-decoration: none; }
    .painting-link:hover { color: #e8c87a; text-decoration: underline; }

    .painting-row em { color: #777; font-style: normal; font-size: 0.75rem; }
    .painting-medium { color: #666; font-size: 0.72rem; }

    .popup-artist em { color: #888; font-size: 0.82rem; }


    /* cluster overrides */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-clip: padding-box;
    }

    .marker-cluster-small       { background-color: rgba(181, 130, 60, 0.5); }
    .marker-cluster-small div   { background-color: rgba(181, 130, 60, 0.9); color: #fff; }
    .marker-cluster-medium      { background-color: rgba(160, 90,  40, 0.5); }
    .marker-cluster-medium div  { background-color: rgba(160, 90,  40, 0.9); color: #fff; }
    .marker-cluster-large       { background-color: rgba(130, 50,  20, 0.5); }
    .marker-cluster-large div   { background-color: rgba(130, 50,  20, 0.9); color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>Art Map</h1>
  <span id="count">loading…</span>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  const map = L.map('map', {
    center: [48, 14],
    zoom: 4,
    preferCanvas: true,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  const markers = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 60,
  });

  function popupHTML(a) {
    const meta = [
      a.birth_year   ? `lived       <span>${escHtml(a.birth_year)}${a.death_year ? '–' + escHtml(a.death_year) : ''}</span>` : '',
      a.birth_place  ? `born        <span>${escHtml(a.birth_place)}</span>`  : '',
      a.citizenship  ? `citizenship <span>${escHtml(a.citizenship)}</span>`  : '',
      a.movement     ? `movement    <span>${escHtml(a.movement)}</span>`     : '',
    ].filter(Boolean).join('<br>');

    const paintingRows = a.paintings.map(p => {
      const link = p.museum_url
        ? `<a class="painting-link" href="${p.museum_url}" target="_blank" rel="noopener">${escHtml(p.title || 'Untitled')}</a>`
        : `<span>${escHtml(p.title || 'Untitled')}</span>`;
      const date   = p.date   ? ` <em>${escHtml(p.date)}</em>` : '';
      const medium = p.medium ? `<div class="painting-medium">${escHtml(p.medium.slice(0, 60))}</div>` : '';
      return `<div class="painting-row">${link}${date}${medium}</div>`;
    }).join('');

    return `
      <div class="popup">
        <div class="popup-artist">${escHtml(a.artist || 'Unknown artist')}</div>
        <div class="popup-meta">${meta}</div>
        <div class="paintings-list">${paintingRows}</div>
      </div>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  fetch('data/paintings.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(artists => {
      const totalPaintings = artists.reduce((n, a) => n + a.paintings.length, 0);
      artists.forEach(a => {
        const marker = L.marker([a.lat, a.lng]);
        marker.bindPopup(() => popupHTML(a), { maxWidth: 320 });
        markers.addLayer(marker);
      });
      map.addLayer(markers);
      document.getElementById('count').textContent =
        `${artists.length} artists · ${totalPaintings} paintings`;
    })
    .catch(err => {
      document.getElementById('count').textContent = 'error loading data';
      console.error(err);
    });
</script>
</body>
</html>
