<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #161d12;
      color: #f0ebe3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #161d12;
      border-bottom: 1px solid #212c1a;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #e8d8b0;
    }

    #count {
      font-size: 0.8rem;
      color: #888;
      font-family: monospace;
    }

    /* ── Map wrap ── */
    #map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    #map .leaflet-tile-pane {
      opacity: 0.85;
    }


    /* ── Sidebar ── */
    #sidebar-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: #171d12;
      border: 1px solid #212c1a;
      border-radius: 6px;
      color: #e8d8b0;
      width: 34px;
      height: 34px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: left 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      pointer-events: none;
    }

    /* Single panel: slides in, 60vh tall */
    #sidebar-panel {
      pointer-events: all;
      width: 200px;
      max-height: 60vh;
      transition: transform 0.25s ease, width 0.25s ease;
      background: rgba(27, 32, 20, 0.98);
      border: 1px solid #212c1a;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(-220px);
      margin-top: 44px;
    }

    #sidebar.open #sidebar-panel,
    #sidebar.expanded #sidebar-panel {
      transform: translateX(0);
    }

    #sidebar.expanded #sidebar-panel {
      width: 600px;
    }

    #sidebar.open #sidebar-btn,
    #sidebar.expanded #sidebar-btn {
      left: 210px;
    }

    /* Nav list */
    #sidebar-nav {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sidebar.expanded #sidebar-nav { display: none; }

    /* Content view */
    #sidebar-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    #sidebar.expanded #sidebar-view { display: flex; }

    .sidebar-opt {
      background: none;
      border: none;
      border-bottom: 1px solid #222;
      color: #bbb;
      padding: 13px 16px;
      text-align: left;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.83rem;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-opt:hover { background: #243019; color: #e8d8b0; }

    #sidebar-back {
      background: none;
      border: none;
      border-bottom: 1px solid #161f13;
      color: #777;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.78rem;
      text-align: left;
      flex-shrink: 0;
    }
    #sidebar-back:hover { color: #ccc; }

    #sidebar-content {
      padding: 14px;
      overflow-y: auto;
      flex: 1;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #bbb;
    }

    #sidebar-content h3 {
      color: #e8d8b0;
      font-size: 0.88rem;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e8d8b0;
      font-weight: normal;
      letter-spacing: 0.04em;
    }

    #sidebar-content p { margin-bottom: 8px; }
    #sidebar-content a { color: #c9a96e; }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid #242b1a;
      gap: 8px;
    }

    .data-row:last-child { border-bottom: none; }

    .data-row .label { color: #ccc; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .data-row .val   { color: #888; font-family: monospace; font-size: 0.75rem; flex-shrink: 0; }
    .data-row .rank  { color: #c9a96e; font-family: monospace; font-size: 0.75rem; width: 20px; flex-shrink: 0; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #1c2215;
      color: #f0ebe3;
      border-radius: 8px;
      border: 1px solid #1e2917;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      padding: 0;
    }

    .leaflet-popup-tip {
      background: #161d12;
    }

    .leaflet-popup-content {
      margin: 0;
      width: 280px !important;
    }

    .popup {
      padding: 14px 16px;
    }

    .popup img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      display: block;
      background: #161d12;
    }

    .popup-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #e8d8b0;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .popup-artist {
      font-size: 0.85rem;
      font-style: italic;
      color: #bbb;
      margin-bottom: 8px;
    }

    .popup-meta {
      font-size: 0.78rem;
      color: #999;
      font-family: monospace;
      line-height: 1.7;
    }

    .popup-meta span {
      color: #ccc;
    }

    .popup-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #c9a96e;
      text-decoration: none;
      border-bottom: 1px solid #c9a96e44;
      padding-bottom: 1px;
    }

    .popup-link:hover { color: #e8c87a; border-color: #e8c87a; }

    .paintings-list {
      margin-top: 10px;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #29361e;
      padding-top: 8px;
    }

    .painting-row {
      font-size: 0.8rem;
      padding: 4px 0;
      border-bottom: 1px solid #29361e;
      line-height: 1.4;
    }

    .painting-row:last-child { border-bottom: none; }

    .painting-link { color: #c9a96e; text-decoration: none; }
    .painting-link:hover { color: #e8c87a; text-decoration: underline; }

    .painting-row em { color: #777; font-style: normal; font-size: 0.75rem; }
    .painting-medium { color: #666; font-size: 0.72rem; }

    .popup-artist em { color: #888; font-size: 0.82rem; }

    /* ── Movement filters ── */
    #movement-filters {
      position: absolute;
      bottom: 30px;
      right: 10px;
      z-index: 998;
      background: rgba(24, 29, 18, 0.93);
      border: 1px solid #212c1a;
      border-radius: 6px;
      padding: 10px 12px 12px;
      width: 190px;
      max-height: 60vh;
      overflow-y: auto;
      font-family: 'Georgia', serif;
    }

    #mf-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #212c1a;
      cursor: pointer;
      user-select: none;
    }

    #mf-title {
      color: #e8d8b0;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    #mf-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #mf-toggles {
      font-size: 0.68rem;
      display: flex;
      gap: 6px;
    }

    #mf-toggles button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.68rem;
      padding: 0;
    }

    #mf-toggles button:hover { color: #c9a96e; }

    #mf-collapse-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.65rem;
      padding: 0;
      line-height: 1;
    }

    #movement-filters.collapsed #mf-list,
    #movement-filters.collapsed #mf-toggles {
      display: none;
    }

    #movement-filters.collapsed {
      padding-bottom: 10px;
    }

    .mf-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0;
      border-bottom: 1px solid #131a0d;
      cursor: pointer;
    }

    .mf-item:last-child { border-bottom: none; }

    .mf-item input[type=checkbox] {
      accent-color: #c9a96e;
      cursor: pointer;
      flex-shrink: 0;
    }

    .mf-item label {
      color: #bbb;
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
      line-height: 1.3;
    }

    .mf-item.unchecked label { color: #2a4f2c; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #sidebar.expanded #sidebar-panel {
        width: calc(100vw - 20px);
      }

      #sidebar.open #sidebar-btn,
      #sidebar.expanded #sidebar-btn {
        left: calc(100vw - 54px);
      }

      .leaflet-popup-content {
        width: 240px !important;
      }

      #movement-filters {
        width: 160px;
        bottom: 60px;
        font-size: 0.72rem;
      }

      #movement-filters:not(.collapsed) {
        max-height: 35vh;
      }

      .mf-item label { font-size: 0.72rem; }

      #timeline {
        padding: 8px 12px 10px;
      }

      .leaflet-top.leaflet-right {
        flex-direction: column;
        align-items: flex-end;
      }
    }

    /* Zoom + layer switcher side by side in top-right */
    .leaflet-top.leaflet-right {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
    }

    .leaflet-top.leaflet-right .leaflet-control {
      float: none;
      margin-bottom: 0;
    }

    /* cluster overrides */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background-clip: padding-box;
    }

    .marker-cluster-small       { background-color: rgba(197, 162, 47, 0.5); }
    .marker-cluster-small div   { background-color: rgba(197, 162, 47, 0.9); color: #fff; }
    .marker-cluster-medium      { background-color: rgba(160, 90,  40, 0.5); }
    .marker-cluster-medium div  { background-color: rgba(160, 90,  40, 0.9); color: #fff; }
    .marker-cluster-large       { background-color: rgba(145, 14, 53, 0.5); }
    .marker-cluster-large div   { background-color: rgba(145, 14, 53, 0.9); color: #fff; }

    .emoji-marker {
      font-size: 18px;
      line-height: 1;
      text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.7));
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Timeline ── */
    #timeline {
      flex-shrink: 0;
      background: #161d12;
      border-top: 1px solid #212c1a;
      padding: 10px 24px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #timeline-label {
      font-family: monospace;
      font-size: 0.78rem;
      color: #aaa;
      text-align: center;
    }

    #timeline-label span { color: #e8d8b0; }

    .range-wrap {
      position: relative;
      height: 20px;
    }

    .range-wrap input[type=range] {
      position: absolute;
      width: 100%;
      height: 4px;
      appearance: none;
      background: transparent;
      pointer-events: none;
      outline: none;
    }

    .range-wrap input[type=range]::-webkit-slider-thumb {
      appearance: none;
      pointer-events: all;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #c9a96e;
      border: 2px solid #8a6a3a;
      cursor: grab;
    }

    .range-wrap input[type=range]::-moz-range-thumb {
      pointer-events: all;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #c9a96e;
      border: 2px solid #8a6a3a;
      cursor: grab;
    }

    #range-track {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      width: 100%;
      background: #243a1e;
      border-radius: 2px;
      z-index: 0;
    }

    #range-fill {
      position: absolute;
      height: 100%;
      background: #c9a96e;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>Art Map</h1>
  <span id="count">loading…</span>
</header>

<div id="map-wrap">
  <div id="map"></div>

  <div id="movement-filters">
    <div id="mf-header">
      <span id="mf-title">Style filter</span>
      <div id="mf-right">
        <div id="mf-toggles">
          <button id="mf-all">all</button>
          <button id="mf-none">none</button>
        </div>
        <button id="mf-collapse-btn" title="Collapse">▼</button>
      </div>
    </div>
    <div id="mf-list"></div>
  </div>

  <button id="sidebar-btn" title="Menu">☰</button>

  <div id="sidebar">
    <div id="sidebar-panel">
      <div id="sidebar-nav">
        <button class="sidebar-opt" data-panel="about">📖 About the project</button>
        <button class="sidebar-opt" data-panel="movements">🎨 Art movements</button>
        <button class="sidebar-opt" data-panel="top10">🏆 Top 10 countries</button>
      </div>
      <div id="sidebar-view">
        <button id="sidebar-back">← back</button>
        <div id="sidebar-content"></div>
      </div>
    </div>
  </div>
</div>

<div id="timeline">
  <div id="timeline-label">
    <span id="year-from">1300</span> – <span id="year-to">2026</span>
  </div>
  <div class="range-wrap">
    <div id="range-track"><div id="range-fill"></div></div>
    <input type="range" id="slider-from" min="1300" max="2026" value="1300" step="1">
    <input type="range" id="slider-to"   min="1300" max="2026" value="2026" step="1">
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  const map = L.map('map', {
    center: [48, 14],
    zoom: 4,
    preferCanvas: true,
    zoomControl: false,
  });
  L.control.zoom({ position: 'topright' }).addTo(map);

  const realistic = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  });

  const schematic = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  });

  schematic.addTo(map);

  L.control.layers(
    { 'Schematic': schematic, 'Realistic': realistic },
    {},
    { position: 'topright', collapsed: false }
  ).addTo(map);

  const markers = L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 60,
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Strip leading zeros from year-like numbers: "0800" → "800", "0800-0900" → "800-900"
  function formatDate(s) {
    if (!s) return '';
    return String(s).replace(/(^|[\s\-–,])0+(\d)/g, '$1$2');
  }

  function popupHTML(a) {
    const meta = [
      a.birth_year   ? `lived       <span>${escHtml(formatDate(a.birth_year))}${a.death_year ? '–' + escHtml(formatDate(a.death_year)) : ''}</span>` : '',
      a.birth_place  ? `born        <span>${escHtml(a.birth_place)}</span>`  : '',
      a.citizenship  ? `citizenship <span>${escHtml(a.citizenship)}</span>`  : '',
      a.movement     ? `movement    <span>${escHtml(a.movement)}</span>`     : '',
    ].filter(Boolean).join('<br>');

    const paintingRows = a.paintings.map(p => {
      const link = p.museum_url
        ? `<a class="painting-link" href="${p.museum_url}" target="_blank" rel="noopener">${escHtml(p.title || 'Untitled')}</a>`
        : `<span>${escHtml(p.title || 'Untitled')}</span>`;
      const date   = p.date   ? ` <em>${escHtml(formatDate(p.date))}</em>` : '';
      const medium = p.medium ? `<div class="painting-medium">${escHtml(p.medium.slice(0, 60))}</div>` : '';
      return `<div class="painting-row">${link}${date}${medium}</div>`;
    }).join('');

    return `
      <div class="popup">
        <div class="popup-artist">${escHtml(a.artist || 'Unknown artist')}</div>
        <div class="popup-meta">${meta}</div>
        <div class="paintings-list">${paintingRows}</div>
      </div>`;
  }

  const MOVEMENT_EMOJI = {
    // European movements
    'baroque':              '🎭',
    'impressionism':        '🌸',
    'impressionist':        '🌸',
    'renaissance':          '🏛️',
    'high renaissance':     '🏛️',
    'northern renaissance': '🏛️',
    'dutch golden age':     '🌷',
    'romanticism':          '🌙',
    'romantic':             '🌙',
    'realism':              '🏘️',
    'neoclassicism':        '⚖️',
    'neoclassical':         '⚖️',
    'rococo':               '🎀',
    'mannerism':            '🌀',
    'symbolism':            '🔮',
    'post-impressionism':   '⭐',
    'neo-impressionism':    '✨',
    'pointillism':          '🔵',
    'divisionism':          '🔵',
    'expressionism':        '💥',
    'neo-expressionism':    '💢',
    'surrealism':           '🫧',
    'cubism':               '🔲',
    'abstract':             '🔷',
    'color field':          '🌈',
    'action painting':      '🖌️',
    'fauvism':              '🦁',
    'gothic':               '⛪',
    'classicism':           '🏺',
    'orientalism':          '🌙',
    'naturalism':           '🌿',
    'pre-raphaelite':       '🌹',
    'barbizon':             '🌲',
    'sienese':              '🕍',
    'netherlandish':        '🪟',
    'academic':             '🎓',
    'les nabis':            '🌈',
    'pop art':              '🎯',
    'op art':               '👁️',
    'dada':                 '🃏',
    'modernism':            '⚡',
    'modern art':           '⚡',
    'contemporary':         '🔮',
    'social realism':       '👷',
    'ashcan':               '🏙️',
    // East Asian periods
    'edo period':           '🏯',
    'meiji period':         '⛩️',
    'muromachi period':     '⚔️',
    'song dynasty':         '🎋',
    'ming dynasty':         '🏮',
    'qing dynasty':         '🐉',
    'yuan dynasty':         '🏹',
  };

  function movementEmojis(movement) {
    if (!movement) return '🎨';
    const emojis = movement.split(';')
      .map(m => {
        const key = m.trim().toLowerCase();
        return MOVEMENT_EMOJI[key]
          ?? Object.entries(MOVEMENT_EMOJI).find(([k]) => key.includes(k))?.[1]
          ?? null;
      })
      .filter(Boolean);
    return emojis.length ? [...new Set(emojis)].join('') : '🎨';
  }

  // Parse the latest plausible year from a date string for timeline filtering.
  // Handles: "ca. 1801-17" → 1817, "800" → 800, "15th century" → 1450
  function parseYear(dateStr) {
    // Normalize uncertainty notation: "186[3?]" → "1863", "1863?" → "1863"
    const s = String(dateStr).replace(/\[(\d+)\??\]/g, '$1').replace(/\?/g, '');

    // Expand abbreviated end year: "1801-17" → 1817
    const abbrev = s.match(/(\d{3,4})[–\-](\d{2})(?!\d)/);
    if (abbrev) {
      const expanded = parseInt(abbrev[1].slice(0, 2) + abbrev[2]);
      if (expanded >= 100 && expanded <= 2026) return expanded;
    }

    // All 3- and 4-digit plausible years
    const allYears = [...s.matchAll(/\d{3,4}/g)]
      .map(m => parseInt(m[0]))
      .filter(y => y >= 100 && y <= 2026);

    // "early/mid/late Nth century"
    const century = s.match(/\b(early|mid|late)?\s*(\d{1,2})(?:st|nd|rd|th)?\s*century\b/i);
    if (century) {
      const base = (parseInt(century[2]) - 1) * 100;
      const offset = { early: 15, mid: 50, late: 83 }[century[1]?.toLowerCase()] ?? 50;
      return base + offset;
    }

    // "early/mid/late 1500s"
    const thousands = s.match(/\b(early|mid|late)?\s*(\d{3,4})s\b/i);
    if (thousands) {
      const base = parseInt(thousands[2]);
      const offset = { early: 15, mid: 50, late: 83 }[thousands[1]?.toLowerCase()] ?? 50;
      return base + offset;
    }

    return allYears.length ? allYears[allYears.length - 1] : null;
  }

  // ── Movement categories ──────────────────────────────────────────────────
  const MOVEMENT_CATEGORIES = [
    { id: 'medieval',      label: '⛪ Medieval & Gothic' },
    { id: 'renaissance',   label: '🏛️ Renaissance' },
    { id: 'baroque',       label: '🎭 Baroque' },
    { id: 'rococo',        label: '🎀 Rococo & Neoclassicism' },
    { id: 'romantic',      label: '🌙 Romanticism & Realism' },
    { id: 'impressionism', label: '🌸 Impressionism' },
    { id: 'postimpr',      label: '⭐ Post-Impressionism' },
    { id: 'modernabstract',label: '🔷 Modern & Abstract' },
    { id: 'eastasian',     label: '🏯 East Asian' },
    { id: 'other',         label: '🎨 Other / Unknown' },
  ];

  function classifyMovement(mov) {
    const m = mov.trim().toLowerCase();
    if (!m) return 'other';
    // East Asian periods & dynasties — check before generic terms
    if (/edo|meiji|muromachi|heian|kamakura|momoyama|azuchi/.test(m)) return 'eastasian';
    if (/qing|ming|yuan|song dynasty|tang dynasty|han dynasty/.test(m)) return 'eastasian';
    if (/dynasty|japanese art|chinese art|korean art/.test(m)) return 'eastasian';
    // European historical
    if (/gothic|sienese|byzantine|romanesque|medieval/.test(m)) return 'medieval';
    if (/renaissance|mannerism|netherlandish/.test(m)) return 'renaissance';
    if (/baroque|dutch golden age/.test(m)) return 'baroque';
    if (/rococo|neoclassic|classicism|academic/.test(m)) return 'rococo';
    // 19th century
    if (/romantic|barbizon|naturalism|ashcan|orientalism|realism/.test(m)) return 'romantic';
    // Impressionism — post- must come before plain impressionism
    if (/post.impressi|symbolism|les nabis|pre.raphaelite|fauvism|nabis/.test(m)) return 'postimpr';
    if (/impressioni|pointillism|divisionism/.test(m)) return 'impressionism';
    // Modern
    if (/expressionism|cubism|abstract|surrealism|dada|modernism|modern art|pop art|op art|contemporary|color field|action painting/.test(m)) return 'modernabstract';
    return 'other';
  }

  function buildMovementFilters(artists, applyFilter) {
    // Count paintings per broad category
    const counts = Object.fromEntries(MOVEMENT_CATEGORIES.map(c => [c.id, 0]));
    artists.forEach(a => {
      a._categories.forEach(cat => { counts[cat] += a.paintings.length; });
    });

    const list = document.getElementById('mf-list');
    list.innerHTML = MOVEMENT_CATEGORIES.map(cat => `
      <div class="mf-item" id="mf-wrap-${cat.id}">
        <input type="checkbox" id="mf-${cat.id}" checked>
        <label for="mf-${cat.id}">${cat.label} <span style="color:#555">(${counts[cat.id]})</span></label>
      </div>
    `).join('');

    // Dim label when unchecked
    list.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', () => {
        cb.closest('.mf-item').classList.toggle('unchecked', !cb.checked);
        applyFilter();
      });
    });

    document.getElementById('mf-all').addEventListener('click', () => {
      list.querySelectorAll('input').forEach(cb => { cb.checked = true; cb.closest('.mf-item').classList.remove('unchecked'); });
      applyFilter();
    });
    document.getElementById('mf-none').addEventListener('click', () => {
      list.querySelectorAll('input').forEach(cb => { cb.checked = false; cb.closest('.mf-item').classList.add('unchecked'); });
      applyFilter();
    });

    document.getElementById('mf-collapse-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const mf = document.getElementById('movement-filters');
      const collapsed = mf.classList.toggle('collapsed');
      document.getElementById('mf-collapse-btn').textContent = collapsed ? '▲' : '▼';
    });
  }

  function getCheckedCategories() {
    return new Set(
      MOVEMENT_CATEGORIES
        .filter(c => document.getElementById(`mf-${c.id}`)?.checked)
        .map(c => c.id)
    );
  }

  // Shared state for live Top 10 — set by applyFilter once data loads
  let currentVisible = [];

  function movementsHTML(subset) {
    const counts = {};
    subset.forEach(a => {
      if (!a.movement) return;
      a.movement.split(';').forEach(m => {
        const key = m.trim();
        if (key) counts[key] = (counts[key] || 0) + a.paintings.length;
      });
    });
    const rows = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 30)
      .map(([m, n]) => `<div class="data-row"><span class="label">${movementEmojis(m)} ${escHtml(m)}</span><span class="val">${n}</span></div>`)
      .join('');
    return `<h3>Art Movements</h3>${rows || '<p style="color:#666">No data</p>'}`;
  }

  function top10HTML(subset) {
    const counts = {};
    subset.forEach(a => {
      const raw = a.birth_place || a.citizenship || '';
      const country = raw.includes(',') ? raw.split(',').pop().trim() : raw.trim();
      if (country) counts[country] = (counts[country] || 0) + a.paintings.length;
    });
    const rows = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 10)
      .map(([c, n], i) => `<div class="data-row"><span class="rank">${i + 1}.</span><span class="label">${escHtml(c)}</span><span class="val">${n}</span></div>`)
      .join('');
    return `<h3>Top 10 Countries</h3>${rows || '<p style="color:#666">No data</p>'}`;
  }

  // ── Sidebar ──────────────────────────────────────────────────────────────
  const sidebarEl      = document.getElementById('sidebar');
  const sidebarBtn     = document.getElementById('sidebar-btn');
  const sidebarOpts    = document.querySelectorAll('.sidebar-opt');
  const sidebarBack    = document.getElementById('sidebar-back');
  const sidebarContent = document.getElementById('sidebar-content');

  const panelData = {
    about: `
      <h3>About Art Map</h3>
      <p>A visual exploration of paintings from the Metropolitan Museum of Art, plotted by each artist's birthplace.</p>
      <p>Data sourced from the <a href="https://github.com/metmuseum/openaccess" target="_blank">Met Open Access</a> dataset, enriched with artist biographies from <a href="https://www.wikidata.org" target="_blank">Wikidata</a>.</p>
      <p>Use the timeline slider at the bottom to filter by year. Click any marker to explore the artist's works.</p>
    `,
    top10:     '<h3>Top 10 Countries</h3><p style="color:#666">Loading…</p>',
  };

  function buildSidebarData(artists) {
    currentVisible = artists;
  }

  sidebarBtn.addEventListener('click', () => {
    const isOpen = sidebarEl.classList.contains('open') || sidebarEl.classList.contains('expanded');
    if (isOpen) {
      sidebarEl.classList.remove('open', 'expanded');
      sidebarBtn.textContent = '☰';
      sidebarOpts.forEach(b => b.classList.remove('active'));
    } else {
      sidebarEl.classList.add('open');
      sidebarBtn.textContent = '✕';
    }
  });

  sidebarOpts.forEach(btn => {
    btn.addEventListener('click', () => {
      sidebarOpts.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const panel = btn.dataset.panel;
      sidebarContent.innerHTML = panel === 'top10'     ? top10HTML(currentVisible)
                               : panel === 'movements' ? movementsHTML(currentVisible)
                               : (panelData[panel] || '');
      sidebarEl.classList.add('expanded');
    });
  });

  sidebarBack.addEventListener('click', () => {
    sidebarEl.classList.remove('expanded');
  });

  // ── Timeline ─────────────────────────────────────────────────────────────
  const sliderFrom = document.getElementById('slider-from');
  const sliderTo   = document.getElementById('slider-to');
  const labelFrom  = document.getElementById('year-from');
  const labelTo    = document.getElementById('year-to');
  const fill       = document.getElementById('range-fill');

  function updateFill() {
    const min  = parseInt(sliderFrom.min);
    const max  = parseInt(sliderFrom.max);
    const from = parseInt(sliderFrom.value);
    const to   = parseInt(sliderTo.value);
    const left  = (from - min) / (max - min) * 100;
    const right = (to   - min) / (max - min) * 100;
    fill.style.left  = left  + '%';
    fill.style.width = (right - left) + '%';
  }

  // ── Data load ─────────────────────────────────────────────────────────────
  fetch('data/paintings.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(artists => {
      // Pre-compute year range and broad movement categories per artist.
      artists.forEach(a => {
        const est_date   = parseInt(a.death_year || a.birth_year) || null;
        const artistYear = parseYear(a.artist);
        const years = a.paintings
          .map(p => parseYear(p.date) ?? artistYear ?? est_date)
          .filter(y => y !== null);
        a._minYear = years.length ? Math.min(...years) : null;
        a._maxYear = years.length ? Math.max(...years) : null;

        // Broad category tags
        const movs = (a.movement || '').split(';').map(m => m.trim()).filter(Boolean);
        const cats = movs.length
          ? [...new Set(movs.map(classifyMovement))]
          : ['other'];
        a._categories = cats;
      });

      // Slider bounds from data
      const allYears = artists.flatMap(a => [a._minYear, a._maxYear]).filter(Boolean);
      const dataMin  = Math.min(...allYears);
      const dataMax  = 2026;
      [sliderFrom, sliderTo].forEach(s => { s.min = dataMin; s.max = dataMax; });
      sliderFrom.value = dataMin;
      sliderTo.value   = dataMax;
      labelFrom.textContent = dataMin;
      labelTo.textContent   = dataMax;
      updateFill();

      // Build sidebar panel data and movement filter checkboxes
      buildSidebarData(artists);
      buildMovementFilters(artists, applyFilter);

      // Build markers
      const markerMap = new Map();
      artists.forEach((a, i) => {
        const emoji = movementEmojis(a.movement);
        const icon = L.divIcon({
          html: `<div class="emoji-marker">${emoji}</div>`,
          className: '',
          iconSize: null,
          iconAnchor: [10, 10],
        });
        const marker = L.marker([a.lat, a.lng], { icon });
        marker.bindPopup(() => popupHTML(a), { maxWidth: 320 });
        markerMap.set(i, marker);
        markers.addLayer(marker);
      });
      map.addLayer(markers);

      currentVisible = artists;

      function applyFilter() {
        const from = parseInt(sliderFrom.value);
        const to   = parseInt(sliderTo.value);
        labelFrom.textContent = from;
        labelTo.textContent   = to;
        updateFill();

        markers.clearLayers();
        const fullRange = from === dataMin && to === dataMax;
        const checkedCats = getCheckedCategories();
        let visible = 0, paintings = 0;
        const visibleArtists = [];
        artists.forEach((a, i) => {
          const inRange = fullRange
            ? true
            : a._minYear !== null && a._minYear <= to && a._maxYear >= from;
          const inCat = a._categories.some(c => checkedCats.has(c));
          if (inRange && inCat) {
            markers.addLayer(markerMap.get(i));
            visible++;
            paintings += a.paintings.length;
            visibleArtists.push(a);
          }
        });
        currentVisible = visibleArtists;
        document.getElementById('count').textContent =
          `${visible} artists · ${paintings} paintings`;

        // Refresh dynamic panels if open
        const activeBtn = document.querySelector('.sidebar-opt.active');
        if (activeBtn?.dataset.panel === 'top10') {
          sidebarContent.innerHTML = top10HTML(currentVisible);
        } else if (activeBtn?.dataset.panel === 'movements') {
          sidebarContent.innerHTML = movementsHTML(currentVisible);
        }
      }

      sliderFrom.addEventListener('input', () => {
        if (parseInt(sliderFrom.value) > parseInt(sliderTo.value))
          sliderFrom.value = sliderTo.value;
        applyFilter();
      });
      sliderTo.addEventListener('input', () => {
        if (parseInt(sliderTo.value) < parseInt(sliderFrom.value))
          sliderTo.value = sliderFrom.value;
        applyFilter();
      });

      const totalPaintings = artists.reduce((n, a) => n + a.paintings.length, 0);
      document.getElementById('count').textContent =
        `${artists.length} artists · ${totalPaintings} paintings`;
    })
    .catch(err => {
      document.getElementById('count').textContent = 'error loading data';
      console.error(err);
    });
</script>
</body>
</html>
